[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-Zunstable-options",
    "-Clinker-flavor=gnu-lld-cc",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-Zunstable-options",
    "-Clinker-flavor=gnu-lld-cc",
    "-Ctarget-cpu=native",
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-Ctarget-cpu=native",
]
