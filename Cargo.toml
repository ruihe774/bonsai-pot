[package]
name = "bonsai-pot"
version = "0.1.0"
edition = "2021"

[lib]
name = "bonsai_pot"
path = "src/lib.rs"

[[bin]]
name = "bonsai-pot"
path = "src/bin/bonsai-pot.rs"
required-features = ["bench-internals"]

[features]
default = []
# Exposes bench/microbench utilities under `bonsai_pot::__bench`. Used by the
# bundled `bonsai-pot` binary; not part of the stable public API.
bench-internals = []

[dependencies]
wgpu = "29"
pollster = "0.3"
bytemuck = { version = "1.16", features = ["derive"] }
half = { version = "2", features = ["bytemuck"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
futures-intrusive = "0.5"

[dev-dependencies]
pollster = "0.3"
bytemuck = { version = "1.16", features = ["derive"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
