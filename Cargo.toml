[package]
name = "bonsai-wgpu"
version = "0.1.0"
edition = "2021"

[dependencies]
wgpu = "29"
pollster = "0.3"
bytemuck = { version = "1.16", features = ["derive"] }
half = { version = "2", features = ["bytemuck"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
futures-intrusive = "0.5"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
